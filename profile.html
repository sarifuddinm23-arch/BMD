<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Ledger - BMD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #10b981; --secondary: #3b82f6; --danger: #ef4444; --dark: #075e54; --bg: #e5ddd5; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .top-nav { background: var(--dark); color: white; padding: 12px 15px; display: flex; align-items: center; gap: 15px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .user-info { flex-grow: 1; }
        .user-info h3 { margin: 0; font-size: 16px; }
        
        .dashboard-row { background: white; display: flex; justify-content: space-around; padding: 10px; border-bottom: 1px solid #ccc; font-size: 12px; }
        .stat-item { text-align: center; flex: 1; border-right: 1px solid #eee; }
        .stat-item:last-child { border-right: none; }
        .stat-item b { display: block; font-size: 14px; color: #333; }

        #chatContainer { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        .msg { max-width: 82%; padding: 10px; border-radius: 10px; position: relative; font-size: 13px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg.out { align-self: flex-end; background: #dcf8c6; border-right: 4px solid var(--danger); } 
        .msg.in { align-self: flex-start; background: white; border-left: 4px solid var(--primary); }

        .msg-date { font-size: 9px; color: #888; margin-bottom: 4px; display: block; }
        .msg-header { font-weight: 800; font-size: 10px; text-transform: uppercase; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .amt { font-size: 17px; font-weight: 900; display: block; margin: 4px 0; }
        .red { color: var(--danger); }
        .green { color: var(--primary); }
        
        .footer-actions { background: #f0f0f0; padding: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .act-btn { border: none; padding: 12px 5px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 5px; }

        @media print { .no-print { display: none !important; } body { background: white; } #chatContainer { overflow: visible; } }
    </style>
</head>
<body>

<div class="top-nav no-print">
    <div onclick="history.back()" style="cursor:pointer"><i class="fas fa-arrow-left"></i></div>
    <div class="user-info">
        <h3 id="accDisplayName">Loading...</h3>
        <small>Smart Ledger History</small>
    </div>
    <i class="fas fa-sync" onclick="loadAllData()" style="cursor:pointer"></i>
</div>

<div class="dashboard-row no-print">
    <div class="stat-item">TOTAL BILL<b id="totalBill">₹0</b></div>
    <div class="stat-item">PAID<b id="totalPaid" style="color:var(--primary)">₹0</b></div>
    <div class="stat-item">BALANCE<b id="totalDue" style="color:var(--danger)">₹0</b></div>
</div>

<div id="chatContainer">
    <div style="text-align:center; padding-top:50px; color:#666;">
        <i class="fas fa-spinner fa-spin"></i> Loading transactions...
    </div>
</div>

<div class="footer-actions no-print">
    <button class="act-btn" style="background:var(--danger)" onclick="location.href='sell_product.html?name='+encodeURIComponent(accName)">
        <i class="fas fa-arrow-up"></i> SELL (OUT)
    </button>
    <button class="act-btn" style="background:var(--secondary)" onclick="location.href='received_product.html?name='+encodeURIComponent(accName)">
        <i class="fas fa-plus-circle"></i> PURCHASE
    </button>
    <button class="act-btn" style="background:var(--primary)" onclick="location.href='payments.html?name='+encodeURIComponent(accName)">
        <i class="fas fa-wallet"></i> PAYMENT (IN)
    </button>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const accName = urlParams.get('name');

    async function loadAllData() {
        if(!accName) return;
        document.getElementById('accDisplayName').innerText = accName;
        const container = document.getElementById('chatContainer');

        try {
            // ১. সকল টেবিল থেকে ডেটা ফেচ করা (আপনার SQL অনুযায়ী)
            const [payRes, recRes, trxRes] = await Promise.all([
                supabaseClient.from('payments').select('*').eq('acc_name', accName),
                supabaseClient.from('received_products').select('*').eq('supplier_name', accName),
                supabaseClient.from('transactions').select('*').or(`acc_name.eq."${accName}",party_name.eq."${accName}"`)
            ]);

            let combinedData = [];

            // ২. Payments টেবিলের ডেটা প্রসেস
            if(payRes.data) payRes.data.forEach(d => {
                combinedData.push({
                    date: d.payment_date || d.created_at,
                    type: d.status || 'Payment',
                    note: `Mode: ${d.mode || 'Cash'}`,
                    amt: parseFloat(d.amount || 0),
                    balance: d.balance || 0,
                    flow: 'in' // টাকা ক্যাশে ঢুকেছে
                });
            });

            // ৩. Received Products (Purchase) প্রসেস
            if(recRes.data) recRes.data.forEach(d => {
                combinedData.push({
                    date: d.created_at,
                    type: 'Purchase',
                    note: `${d.product_name} (${d.quantity} ${d.unit || ''})`,
                    amt: parseFloat(d.total_price || 0),
                    balance: d.due_amount || 0,
                    flow: 'out' // পণ্য বাইরে থেকে এসেছে (দেনা বেড়েছে)
                });
            });

            // ৪. Transactions টেবিল প্রসেস
            if(trxRes.data) trxRes.data.forEach(d => {
                const isSell = d.type && d.type.toLowerCase().includes('sell');
                combinedData.push({
                    date: d.created_at,
                    type: d.type || 'Entry',
                    note: d.product_name || d.description,
                    amt: parseFloat(d.total_price || d.amount || 0),
                    balance: d.due_amount || d.due_balance || 0,
                    flow: isSell ? 'out' : 'in'
                });
            });

            // ৫. তারিখ অনুযায়ী সাজানো
            combinedData.sort((a, b) => new Date(a.date) - new Date(b.date));

            container.innerHTML = "";
            let tBill = 0, tPaid = 0;

            if (combinedData.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding-top:50px; color:#888;">No transactions found.</div>';
            }

            combinedData.forEach(item => {
                const isOut = item.flow === 'out';
                if(isOut) tBill += item.amt;
                else tPaid += item.amt;

                container.innerHTML += `
                    <div class="msg ${isOut ? 'out' : 'in'}">
                        <span class="msg-date">${new Date(item.date).toLocaleDateString()}</span>
                        <div class="msg-header">
                            <span>${item.type}</span>
                            <span style="color:#888">Bal: ₹${item.balance}</span>
                        </div>
                        <div style="font-weight:600;">${item.note || '-'}</div>
                        <span class="amt ${isOut ? 'red' : 'green'}">₹${item.amt}</span>
                    </div>
                `;
            });

            document.getElementById('totalBill').innerText = "₹" + tBill.toLocaleString();
            document.getElementById('totalPaid').innerText = "₹" + tPaid.toLocaleString();
            document.getElementById('totalDue').innerText = "₹" + (tBill - tPaid).toLocaleString();
            
            container.scrollTop = container.scrollHeight;

        } catch (err) {
            console.error(err);
            container.innerHTML = `<div style="color:red; text-align:center; padding:20px;">Error: ${err.message}</div>`;
        }
    }

    window.onload = loadAllData;
</script>
</body>
</html>
