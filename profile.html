<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Ledger - BMD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #10b981; --secondary: #3b82f6; --danger: #ef4444; --dark: #0f172a; --bg: #e5ddd5; } /* WhatsApp BG Color */
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }

        /* Header Styles */
        .top-nav { background: #075e54; color: white; padding: 12px 15px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .back-btn { cursor: pointer; font-size: 18px; }
        .user-info { flex-grow: 1; }
        .user-info h3 { margin: 0; font-size: 16px; }
        .user-info small { opacity: 0.8; font-size: 11px; }

        /* Summary Dashboard */
        .dashboard-row { background: white; display: flex; justify-content: space-around; padding: 10px; border-bottom: 1px solid #ddd; }
        .stat-item { text-align: center; border-right: 1px solid #eee; flex: 1; }
        .stat-item:last-child { border-right: none; }
        .stat-item small { display: block; font-size: 9px; color: #666; font-weight: bold; text-transform: uppercase; }
        .stat-item span { font-size: 14px; font-weight: 800; color: var(--dark); }

        /* Chat Area */
        #chatContainer { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        /* Message Bubbles */
        .msg { max-width: 85%; padding: 10px 12px; border-radius: 10px; position: relative; font-size: 13px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        /* Give/Take Styles */
        .msg.give { align-self: flex-end; background: #dcf8c6; border-right: 4px solid var(--danger); } /* You Gave (Sell/Out) */
        .msg.take { align-self: flex-start; background: white; border-left: 4px solid var(--primary); } /* You Got (Received/Payment) */

        .msg-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 11px; font-weight: bold; }
        .msg-body { font-weight: 500; }
        .msg-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 10px; color: #666; }
        .amt { font-size: 16px; font-weight: 900; }
        .amt-red { color: var(--danger); }
        .amt-green { color: var(--primary); }

        /* Footer Actions */
        .footer-actions { background: white; padding: 12px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; border-top: 1px solid #ccc; }
        .action-btn { border: none; padding: 10px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 11px; }
        .btn-sell { background: var(--danger); }
        .btn-rec { background: var(--secondary); }
        .btn-pay { background: var(--primary); }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="top-nav no-print">
    <div class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></div>
    <div class="user-info">
        <h3 id="accDisplayName">Loading...</h3>
        <small id="accStatus">Online Transaction Ledger</small>
    </div>
    <div style="display:flex; gap:15px;">
        <i class="fas fa-print" onclick="window.print()" style="cursor:pointer"></i>
        <i class="fas fa-sync" onclick="loadData()" style="cursor:pointer"></i>
    </div>
</div>

<div class="dashboard-row no-print">
    <div class="stat-item"><small>Total Qty</small><span id="boxQty">0</span></div>
    <div class="stat-item"><small>Total Value</small><span id="boxVal">₹ 0</span></div>
    <div class="stat-item"><small>Balance Due</small><span id="boxDue" style="color:var(--danger)">₹ 0</span></div>
</div>

<div id="chatContainer">
    </div>

<div class="footer-actions no-print">
    <button class="action-btn btn-sell" onclick="location.href='sell_product.html?name='+encodeURIComponent(accName)">
        <i class="fas fa-minus-circle"></i> SELL (OUT)
    </button>
    <button class="action-btn btn-rec" onclick="location.href='received_product.html?name='+encodeURIComponent(accName)">
        <i class="fas fa-plus-circle"></i> RECEIVED
    </button>
    <button class="action-btn btn-pay" onclick="location.href='payments.html?name='+encodeURIComponent(accName)">
        <i class="fas fa-wallet"></i> PAYMENT
    </button>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const accName = urlParams.get('name');

    async function loadData() {
        if(!accName) return;
        document.getElementById('accDisplayName').innerText = accName;

        try {
            const { data: transactions, error } = await supabaseClient
                .from('transactions') 
                .select('*')
                .or(`account_name.eq."${accName}",acc_name.eq."${accName}"`)
                .order('created_at', { ascending: true }); // Chat format looks better old-to-new

            if(error) throw error;

            const container = document.getElementById('chatContainer');
            container.innerHTML = "";

            let tQty = 0, tAmt = 0, tPaid = 0;

            if (!transactions || transactions.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#777; margin-top:50px;">No transactions yet. Start by adding one below!</div>';
                return;
            }

            transactions.forEach(trx => {
                const typeRaw = trx.type || 'Other';
                const type = typeRaw.toLowerCase();
                const qty = parseFloat(trx.quantity || trx.qty || 0);
                const amt = parseFloat(trx.total_amount || trx.amount || 0);
                const paid = parseFloat(trx.paid_amount || trx.paid || 0);
                const date = (trx.date || trx.created_at || "").split('T')[0];

                tQty += qty; tAmt += amt; tPaid += paid;

                // Determine if it's a "Give" (Red/Sell) or "Take" (Green/Payment)
                const isGive = (type.includes('sell') || type.includes('out'));
                const bubbleClass = isGive ? 'give' : 'take';
                const amtClass = isGive ? 'amt-red' : 'amt-green';
                const displayAmt = isGive ? amt : (paid || amt);

                container.innerHTML += `
                    <div class="msg ${bubbleClass}">
                        <div class="msg-header">
                            <span>${typeRaw.toUpperCase()}</span>
                            <span>${date}</span>
                        </div>
                        <div class="msg-body">
                            ${trx.product_name || trx.description || 'Transaction'} 
                            ${qty > 0 ? `<br><small>Qty: ${qty}</small>` : ''}
                        </div>
                        <div class="msg-footer">
                            <span class="amt ${amtClass}">₹${displayAmt}</span>
                            <span style="font-weight:bold; color:#999;">Bal: ₹${trx.due_balance || trx.balance || 0}</span>
                        </div>
                    </div>
                `;
            });

            // Update Header Stats
            document.getElementById('boxQty').innerText = tQty;
            document.getElementById('boxVal').innerText = "₹" + tAmt;
            document.getElementById('boxDue').innerText = "₹" + (tAmt - tPaid);
            
            // Scroll to bottom like WhatsApp
            container.scrollTop = container.scrollHeight;

        } catch (err) {
            console.error(err);
            alert("Database Error!");
        }
    }

    window.onload = loadData;
</script>

</body>
</html>
